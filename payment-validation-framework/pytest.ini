[pytest]
testpaths = tests
addopts = -v --tb=short
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_date_format = %H:%M:%S
markers =
    unit: Unit tests for scorer and utilities
    integration: End-to-end pipeline tests
    smoke: Quick sanity run on 2-3 merchants
